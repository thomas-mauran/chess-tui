name: Create Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. 2.6.0)"
        required: true

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        name: Checkout project
        with:
          fetch-depth: 0

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --unreleased --strip all
        env:
          OUTPUT: changelog_fragment.md

      - name: Build release body with logo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          GENERATED=$(gh api repos/${{ github.repository }}/releases/generate-notes \
            --method POST \
            --field tag_name=${{ github.event.inputs.version }} \
            --jq '.body')

          CONTRIBUTORS=$(echo "$GENERATED" | awk '/^## New Contributors/{found=1} found{print}' | grep -v "^\*\*Full Changelog")
          FULL_CHANGELOG=$(echo "$GENERATED" | grep "^\*\*Full Changelog")

          {
            echo '<p align="center">'
            echo '  <img src="https://raw.githubusercontent.com/${{ github.repository }}/main/website/static/img/logo.png" width="180" />'
            echo '</p>'
            echo ''
            echo '<h1 align="center">Chess-tui ${{ github.event.inputs.version }}</h1>'
            echo ''
            cat changelog_fragment.md
            echo ''
            if [ -n "$CONTRIBUTORS" ]; then
              echo "$CONTRIBUTORS"
              echo ''
            fi
            if [ -n "$FULL_CHANGELOG" ]; then
              echo "$FULL_CHANGELOG"
            fi
          } > release_body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: ${{ github.event.inputs.version }}
          body_path: release_body.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-binaries:
    needs: create-release
    uses: ./.github/workflows/release_binary.yml
    with:
      tag: ${{ github.event.inputs.version }}
    permissions:
      contents: write

  release-docker:
    needs: create-release
    uses: ./.github/workflows/release_docker.yml
    with:
      tag: ${{ github.event.inputs.version }}
    permissions:
      packages: write
      contents: read

  release-blog-post:
    needs: create-release
    uses: ./.github/workflows/generate-blog-post.yml
    with:
      tag: ${{ github.event.inputs.version }}
    permissions:
      contents: write
      pull-requests: write
