name: Create Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. 2.6.0)"
        required: true

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      body: ${{ steps.capture.outputs.body }}
      published_at: ${{ steps.capture.outputs.published_at }}
    steps:
      - uses: actions/checkout@v4
        name: Checkout project
        with:
          fetch-depth: 0

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --unreleased --strip all
        env:
          OUTPUT: changelog_fragment.md

      - name: Build release body with logo
        run: |
          {
            echo '<p align="center">'
            echo '  <img src="https://raw.githubusercontent.com/${{ github.repository }}/main/website/static/img/logo.png" width="180" />'
            echo '</p>'
            echo ''
            cat changelog_fragment.md
          } > release_body.md

      - name: Capture release outputs
        id: capture
        run: |
          echo "published_at=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> $GITHUB_OUTPUT
          {
            echo "body<<EOF"
            cat release_body.md
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: ${{ github.event.inputs.version }}
          body_path: release_body.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-binaries:
    needs: create-release
    uses: ./.github/workflows/release_binary.yml
    with:
      tag: ${{ github.event.inputs.version }}
    permissions:
      contents: write

  release-docker:
    needs: create-release
    uses: ./.github/workflows/release_docker.yml
    with:
      tag: ${{ github.event.inputs.version }}
    permissions:
      packages: write
      contents: read

  release-cargo:
    needs: create-release
    uses: ./.github/workflows/release_cargo.yml
    secrets: inherit

  release-blog-post:
    needs: create-release
    uses: ./.github/workflows/generate-blog-post.yml
    with:
      tag: ${{ github.event.inputs.version }}
      body: ${{ needs.create-release.outputs.body }}
      published_at: ${{ needs.create-release.outputs.published_at }}
    permissions:
      contents: write
      pull-requests: write
